document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"3388fd2e-eff9-425c-ad73-a8c8d1618549\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet data-dc-atomics=\"\">\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;background:#f4f3f0;font-family:system-ui,-apple-system,\"Segoe UI\",\"Malgun Gothic\",\"Apple SD Gothic Neo\",\"Hiragino Sans\",\"Yu Gothic\",sans-serif;-webkit-font-smoothing:antialiased;color:#1c1917}\n  a{color:#6682FF}a:hover{color:#4f66e0}\n  input,textarea,select{font-family:inherit}\n  input:focus,textarea:focus,select:focus{outline:none;border-color:#6682FF;box-shadow:0 0 0 3px rgba(102,130,255,.20)}\n  ::placeholder{color:#c4c0bb}\n  @keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}\n  @keyframes fadeIn{from{opacity:0}to{opacity:1}}\n  @keyframes panelIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column\">\n\n  <!-- ===== TOP BAR ===== -->\n  <div style=\"position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;height:56px;box-sizing:border-box;padding:0 26px;background:#fff;border-bottom:1px solid #e7e4df\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <img src=\"5e21372f-c7b8-4039-99be-433269346dbc\" alt=\"CLUe\" style=\"width:30px;height:30px;border-radius:8px;object-fit:cover;display:block\">\n      <div style=\"font-size:15px;font-weight:700;letter-spacing:-.01em\">{{ L.title }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <div style=\"display:flex;align-items:center;gap:2px;background:#efeee9;border-radius:9px;padding:3px\">\n        <sc-for list=\"{{ langBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n          <button style=\"{{ b.style }}\" onclick=\"{{ b.onClick }}\">{{ b.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:22px;background:#e0ddd7\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <span style=\"font-size:11px;font-weight:700;color:#a8a29e;letter-spacing:.03em;text-transform:uppercase\">{{ L.roleSwitch }}<\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:2px;background:#efeee9;border-radius:9px;padding:3px\">\n          <sc-for list=\"{{ roleBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <button style=\"{{ b.style }}\" onclick=\"{{ b.onClick }}\">{{ b.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== ROLE BANNER ===== -->\n  <div style=\"display:flex;align-items:center;gap:9px;height:36px;box-sizing:border-box;padding:0 26px;white-space:nowrap;overflow:hidden;background:#eef1ff;border-bottom:1px solid #d9deff\">\n    <span style=\"width:6px;height:6px;border-radius:50%;background:#6682FF\"><\u002Fspan>\n    <span style=\"font-size:12.5px;color:#3f52c4;font-weight:500\">{{ roleDesc }}<\u002Fspan>\n  <\u002Fdiv>\n  <!-- ===== NAV TABS ===== -->\n  <sc-if value=\"{{ showTabs }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"display:flex;align-items:center;gap:4px;height:44px;box-sizing:border-box;padding:0 22px;background:#fff;border-bottom:1px solid #e7e4df\">\n    <sc-for list=\"{{ navTabs }}\" as=\"t\" hint-placeholder-count=\"2\">\n      <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"flex:1;width:100%;max-width:1120px;margin:0 auto;padding:26px 26px 60px;display:flex;flex-direction:column;justify-content:flex-start\">\n\n    <!-- ============ VIEWER ============ -->\n    <sc-if value=\"{{ isViewer }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin:auto 0;width:100%;background:#fff;border:1px solid #e7e4df;border-radius:14px;box-shadow:0 6px 24px -12px rgba(0,0,0,.1);overflow:hidden;display:flex;min-height:540px\">\n        <!-- version list -->\n        <div style=\"width:236px;flex:none;border-right:1px solid #eeece8;background:#fbfaf8;padding:14px 10px\">\n          <div style=\"font-size:10.5px;font-weight:700;color:#a8a29e;letter-spacing:.04em;padding:6px 10px 10px;text-transform:uppercase\">{{ L.versionList }}<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <sc-for list=\"{{ viewerList }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ p.onSelect }}\" style=\"{{ p.listStyle }}\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;width:100%\">\n                  <span style=\"font:700 13px ui-monospace,Menlo,monospace\">{{ p.version }}<\u002Fspan>\n                  <span style=\"display:flex;gap:3px\">\n                    <sc-for list=\"{{ p.dots }}\" as=\"d\" hint-placeholder-count=\"2\">\n                      <span style=\"width:6px;height:6px;border-radius:2px;background:{{ d.color }}\"><\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fspan>\n                <\u002Fdiv>\n                <span style=\"font-size:11px;color:#a8a29e;margin-top:3px\">{{ p.date }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- detail -->\n        <div style=\"flex:1;padding:26px 30px;min-width:0\">\n          <sc-if value=\"{{ selected }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:baseline;gap:11px;flex-wrap:wrap\">\n              <span style=\"font:800 25px ui-monospace,Menlo,monospace;color:#6682FF;letter-spacing:-.02em\">{{ selected.version }}<\u002Fspan>\n              <sc-if value=\"{{ selected.stable }}\" hint-placeholder-val=\"{{ true }}\">\n                <span style=\"font-size:10px;font-weight:700;color:#15803d;background:#f0fdf4;border:1px solid #bbf7d0;padding:2px 8px;border-radius:6px\">{{ L.stable }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#78716c;margin-top:7px\">{{ selected.summaryLine }}<\u002Fdiv>\n            <div style=\"height:1px;background:#eeece8;margin:20px 0\"><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ selected.changesEnriched }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:14px;padding:15px 17px;background:#fbfaf8;border:1px solid #eeece8;border-radius:11px\">\n                  <span style=\"width:3px;flex:none;border-radius:2px;background:{{ c.color }}\"><\u002Fspan>\n                  <div style=\"min-width:0;flex:1\">\n                    <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px\">\n                      <span style=\"display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;white-space:nowrap;color:{{ c.color }};background:{{ c.bg }};border:1px solid {{ c.border }}\">{{ c.typeLabel }}<\u002Fspan>\n                      <span style=\"font-size:11px;font-weight:600;color:#a8a29e;letter-spacing:.02em\">{{ c.module }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:14px;line-height:1.5;color:#1c1917;font-weight:600\">{{ c.title }}<\u002Fdiv>\n                    <div style=\"font-size:12.5px;line-height:1.6;color:#78716c;margin-top:4px\">{{ c.desc }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ REGISTRAR ============ -->\n    <sc-if value=\"{{ isRegistrar }}\" hint-placeholder-val=\"{{ true
